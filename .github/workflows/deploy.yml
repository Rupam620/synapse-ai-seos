name: deploy-to-aks

on:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: fastapi-task-backlog

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run test suite
        run: pytest -q

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ secrets.REGISTRY_LOGIN_SERVER }}
        run: |
          TAG=${GITHUB_SHA}
          IMAGE=${REGISTRY}/${IMAGE_NAME}:${TAG}
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV
          docker build -t ${IMAGE} .
          docker push ${IMAGE}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Render deployment manifest
        run: |
          sed "s|REPLACE_IMAGE|${IMAGE}|g" k8s/deployment.yml > k8s/deployment.rendered.yml

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/deployment.rendered.yml
          kubectl apply -f k8s/service.yml
          kubectl rollout status deployment/fastapi-task-backlog --timeout=180s

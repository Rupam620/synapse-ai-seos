name: CI-CD-AKS

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: fastapi-task-backlog

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest

      - name: Run tests
        env:
          JWT_SECRET_KEY: dev-secret-key-for-testing
          JWT_ALGORITHM: HS256
        run: pytest -q

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker image
        id: docker_build
        env:
          REGISTRY: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          SHA_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/${IMAGE_NAME}:${SHA_TAG}"
          IMAGE_URI_LATEST="$REGISTRY/${IMAGE_NAME}:latest"
          docker build -t "$IMAGE_URI" -t "$IMAGE_URI_LATEST" .
          docker push "$IMAGE_URI"
          docker push "$IMAGE_URI_LATEST"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}

      - name: Deploy to AKS
        env:
          IMAGE_URI: ${{ steps.docker_build.outputs.image_uri }}
        run: |
          sed "s|REPLACE_IMAGE|${IMAGE_URI}|g" k8s/deployment.yml | kubectl apply -f -
          kubectl apply -f k8s/service.yml
          kubectl rollout status deployment/fastapi-task-backlog --timeout=180s

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-task-backlog
  labels:
    app: fastapi-task-backlog
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: fastapi-task-backlog
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: fastapi-task-backlog
    spec:
      containers:
        - name: fastapi-task-backlog
          image: REPLACE_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: fastapi-task-backlog:local
    container_name: fastapi-task-backlog
    env_file:
      - .env.example
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
